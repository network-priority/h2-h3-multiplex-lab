name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow the Pages deploy job to publish.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  test:
    name: Engine tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check all JS files
        run: |
          for f in $(find js test -name '*.js'); do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Run engine tests
        run: node --test

  deploy:
    name: Deploy static site to GitHub Pages
    # Only publish from the default branch after tests pass.
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if it isn't already, so the first
          # deploy from a fresh clone/fork doesn't fail.
          enablement: true

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is a static site; no build step required.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
